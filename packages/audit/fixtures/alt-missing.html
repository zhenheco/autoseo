<!doctype html>
<html lang="en">
  <head>
    <title>Missing Alt Text</title>
    <meta
      name="description"
      content="This page has complete metadata but includes images without usable alt text."
    />
    <meta property="og:title" content="Missing Alt Text" />
    <meta property="og:image" content="https://example.com/images/share.jpg" />
    <link rel="canonical" href="https://example.com/alt-missing" />
    <script type="application/ld+json">
      { "@context": "https://schema.org", "@type": "WebPage" }
    </script>
  </head>
  <body>
    <main>
      <h1>Missing Alt Text</h1>
      <img src="/images/missing-alt.jpg" />
      <img src="/images/empty-alt.jpg" alt="" />
    </main>
  </body>
</html>
