name: Auto Generate Articles

on:
  workflow_dispatch:

concurrency:
  group: auto-generate-articles
  cancel-in-progress: false

jobs:
  auto-generate-articles:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run auto-generate articles
        id: auto-generate
        run: pnpm tsx packages/web/scripts/jobs/auto-generate-articles.ts
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_API_BASE_URL: ${{ secrets.PERPLEXITY_API_BASE_URL }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_BASE_URL: ${{ secrets.GEMINI_API_BASE_URL }}
          TRENDS_LLM_MODEL: ${{ secrets.TRENDS_LLM_MODEL }}
          CF_AI_GATEWAY_ENABLED: ${{ secrets.CF_AI_GATEWAY_ENABLED }}
          CF_AI_GATEWAY_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CF_AI_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_ID }}
          CF_AI_GATEWAY_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          AI_GATEWAY_ENABLED: ${{ secrets.AI_GATEWAY_ENABLED }}
          AI_GATEWAY_ACCOUNT_ID: ${{ secrets.AI_GATEWAY_ACCOUNT_ID }}
          AI_GATEWAY_ID: ${{ secrets.AI_GATEWAY_ID }}
          AI_GATEWAY_TOKEN: ${{ secrets.AI_GATEWAY_TOKEN }}
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN: ${{ secrets.GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN }}
          GOOGLE_TRENDS_RSS_URL: ${{ secrets.GOOGLE_TRENDS_RSS_URL }}
          GOOGLE_TRENDS_GEO: ${{ secrets.GOOGLE_TRENDS_GEO }}
          CF_EMAIL_API_URL: ${{ secrets.CF_EMAIL_API_URL }}
          CF_EMAIL_API_KEY: ${{ secrets.CF_EMAIL_API_KEY }}
          CF_EMAIL_FROM: ${{ secrets.CF_EMAIL_FROM }}
          POSTHOG_PERSONAL_API_KEY: ${{ secrets.POSTHOG_PERSONAL_API_KEY }}
          NEXT_PUBLIC_POSTHOG_API_KEY: ${{ secrets.NEXT_PUBLIC_POSTHOG_API_KEY }}
          NEXT_PUBLIC_POSTHOG_HOST: ${{ secrets.NEXT_PUBLIC_POSTHOG_HOST }}

      - name: Report auto-generate articles result
        run: |
          echo "created=${{ steps.auto-generate.outputs.count }}"
          echo "brands_processed=${{ steps.auto-generate.outputs.brands_processed }}"
          echo "quota_exceeded=${{ steps.auto-generate.outputs.quota_exceeded }}"
