name: Trends Research

on:
  workflow_dispatch:

concurrency:
  group: trends-research
  cancel-in-progress: false

jobs:
  trends-research:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run trends research
        run: pnpm --dir packages/web exec tsx scripts/jobs/trends-research.ts
        env:
          SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PERPLEXITY_API_BASE_URL: ${{ secrets.PERPLEXITY_API_BASE_URL }}
          PERPLEXITY_MODEL: ${{ secrets.PERPLEXITY_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_BASE_URL: ${{ secrets.GEMINI_API_BASE_URL }}
          TRENDS_LLM_MODEL: ${{ secrets.TRENDS_LLM_MODEL }}
          CF_AI_GATEWAY_ENABLED: ${{ secrets.CF_AI_GATEWAY_ENABLED }}
          CF_AI_GATEWAY_ACCOUNT_ID: ${{ secrets.CF_AI_GATEWAY_ACCOUNT_ID }}
          CF_AI_GATEWAY_ID: ${{ secrets.CF_AI_GATEWAY_ID }}
          CF_AI_GATEWAY_TOKEN: ${{ secrets.CF_AI_GATEWAY_TOKEN }}
          GSC_ACCESS_TOKEN: ${{ secrets.GSC_ACCESS_TOKEN }}
          GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN: ${{ secrets.GOOGLE_SEARCH_CONSOLE_ACCESS_TOKEN }}
          GOOGLE_TRENDS_RSS_URL: ${{ secrets.GOOGLE_TRENDS_RSS_URL }}
          GOOGLE_TRENDS_GEO: ${{ secrets.GOOGLE_TRENDS_GEO }}
